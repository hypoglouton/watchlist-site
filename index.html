<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma Watchlist</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #94a3b8;
    }

    .search-box, .section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 220px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid #334155;
      border-radius: 10px;
      margin-top: 12px;
      background: #0f172a;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
    }

    .meta {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .remove-btn {
      background: #dc2626;
    }

    .label {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ma Watchlist</h1>
    <p>Recherche par nom ou ticker, puis ajoute les valeurs à ta watchlist.</p>

    <div class="search-box">
      <div class="row">
        <input id="searchInput" type="text" placeholder="Exemple : Microsoft, MSFT, CW8..." />
        <button id="searchButton">Rechercher</button>
      </div>
      <div id="results" style="margin-top: 14px;"></div>
    </div>

    <div class="section">
      <h2 class="label">Ma watchlist</h2>
      <div id="watchlist"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
